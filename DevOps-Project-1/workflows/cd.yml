name: CD Pipeline - Update Manifests & Deploy via Argo CD

on:
  workflow_run:
    workflows: ["CI Pipeline - Build, Scan & Push"]
    types: [completed]
    branches: [main, develop]

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Deploy to DEV (develop branch)
  # ─────────────────────────────────────────
  update-dev-manifest:
    name: 🚀 Update Dev Manifest (Auto Deploy)
    runs-on: ubuntu-latest
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'develop'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GIT_PAT }}
          ref: develop

      - name: Update image tag in dev manifest
        run: |
          IMAGE_TAG=${{ github.event.workflow_run.head_sha }}
          echo "Updating dev manifest with image tag: $IMAGE_TAG"
          sed -i "s|glare247/mini-finance-app:.*|glare247/mini-finance-app:$IMAGE_TAG|g" \
            k8s/dev/manifests.yaml
          echo "✅ Updated manifest:"
          grep "image:" k8s/dev/manifests.yaml

      - name: Commit and push updated manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/dev/manifests.yaml
          git commit -m "ci: update dev image tag to ${{ github.event.workflow_run.head_sha }}"
          git push origin develop

  # ─────────────────────────────────────────
  # JOB 2: Deploy to PRODUCTION (main branch)
  # Requires manual approval via GitHub Environment
  # ─────────────────────────────────────────
  update-production-manifest:
    name: 🏭 Update Production Manifest
    runs-on: ubuntu-latest
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    environment: production                    # ⏸️ PAUSES for manual approval

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GIT_PAT }}
          ref: main

      - name: Update image tag in production manifest
        run: |
          IMAGE_TAG=${{ github.event.workflow_run.head_sha }}
          sed -i "s|glare247/mini-finance-app:.*|glare247/mini-finance-app:$IMAGE_TAG|g" \
            k8s/production/manifests.yaml
          echo "✅ Updated manifest:"
          grep "image:" k8s/production/manifests.yaml

      - name: Commit and push updated manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/production/manifests.yaml
          git commit -m "ci: update production image tag to ${{ github.event.workflow_run.head_sha }}"
          git push origin main

  # ─────────────────────────────────────────
  # JOB 3: Verify Deployment Health
  # ─────────────────────────────────────────
  verify-deployment:
    name: ✅ Verify Deployment
    runs-on: ubuntu-latest
    needs: [update-dev-manifest]
    if: always() && needs.update-dev-manifest.result == 'success'

    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Get GKE credentials
        run: |
          gcloud container clusters get-credentials ${{ secrets.GKE_CLUSTER_NAME }} \
            --zone ${{ secrets.GKE_CLUSTER_ZONE }} \
            --project ${{ secrets.GCP_PROJECT_ID }}

      - name: Wait for Argo CD to sync (60s)
        run: sleep 60

      - name: Verify pod health in dev
        run: |
          kubectl get pods -n mini-finance-dev
          kubectl rollout status deployment/mini-finance-app \
            -n mini-finance-dev --timeout=120s
