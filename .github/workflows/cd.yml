name: CD Pipeline - Update Manifests & Deploy via Argo CD

on:
  workflow_run:
    workflows: ["CI Pipeline - Build, Scan & Push"]
    types: [completed]
    branches: [main, develop]

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Deploy to DEV (develop branch)
  # Argo CD watches k8s/dev → auto-syncs
  # ─────────────────────────────────────────
  update-dev-manifest:
    name: 🚀 Update Dev Manifest (Auto Deploy)
    runs-on: ubuntu-latest
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'develop'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GIT_PAT }}
          ref: develop

      - name: Update image tag in dev manifest
        run: |
          IMAGE_TAG=${{ github.event.workflow_run.head_sha }}
          echo "🔄 Updating dev manifest with image tag: $IMAGE_TAG"

          sed -i "s|glare247/mini-finance-app:.*|glare247/mini-finance-app:$IMAGE_TAG|g" \
            DevOps-Project-1/k8s/dev/manifests.yaml

          echo "✅ Updated manifest:"
          grep "image:" DevOps-Project-1/k8s/dev/manifests.yaml

      - name: Commit and push updated manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add DevOps-Project-1/k8s/dev/manifests.yaml
          git diff --staged --quiet || git commit -m "ci: update dev image tag to ${{ github.event.workflow_run.head_sha }}"
          git push origin develop

      - name: Summary
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ Dev manifest updated!"
          echo "🔄 Argo CD (mini-finance-app-dev) will auto-sync"
          echo "📦 Image: glare247/mini-finance-app:${{ github.event.workflow_run.head_sha }}"
          echo "🎯 Namespace: mini-finance-dev"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

  # ─────────────────────────────────────────
  # JOB 2: Deploy to PRODUCTION (main branch)
  # ⏸️ Pauses for manual approval first
  # ─────────────────────────────────────────
  update-production-manifest:
    name: 🏭 Update Production Manifest
    runs-on: ubuntu-latest
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    environment: production                    # ⏸️ PAUSES for manual approval

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GIT_PAT }}
          ref: main

      - name: Update image tag in production manifest
        run: |
          IMAGE_TAG=${{ github.event.workflow_run.head_sha }}
          echo "🔄 Updating production manifest with image tag: $IMAGE_TAG"

          sed -i "s|glare247/mini-finance-app:.*|glare247/mini-finance-app:$IMAGE_TAG|g" \
            DevOps-Project-1/k8s/production/manifests.yaml

          echo "✅ Updated manifest:"
          grep "image:" DevOps-Project-1/k8s/production/manifests.yaml

      - name: Commit and push updated manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add DevOps-Project-1/k8s/production/manifests.yaml
          git diff --staged --quiet || git commit -m "ci: update production image tag to ${{ github.event.workflow_run.head_sha }}"
          git push origin main

      - name: Summary
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ Production manifest updated!"
          echo "🔄 Argo CD will auto-sync to mini-finance-prod"
          echo "📦 Image: glare247/mini-finance-app:${{ github.event.workflow_run.head_sha }}"
          echo "👤 Approved by: ${{ github.actor }}"
          echo "🎯 Namespace: mini-finance-prod"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

  # ─────────────────────────────────────────
  # JOB 3: Verify Dev Deployment Health
  # Connects to GKE and checks pod status
  # ─────────────────────────────────────────
  verify-dev-deployment:
    name: ✅ Verify Dev Deployment
    runs-on: ubuntu-latest
    needs: update-dev-manifest
    if: always() && needs.update-dev-manifest.result == 'success'

    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Get GKE credentials
        run: |
          gcloud container clusters get-credentials ${{ secrets.GKE_CLUSTER_NAME }} \
            --zone ${{ secrets.GKE_CLUSTER_ZONE }} \
            --project ${{ secrets.GCP_PROJECT_ID }}

      - name: Wait for Argo CD to sync
        run: |
          echo "⏳ Waiting 60s for Argo CD to detect and sync changes..."
          sleep 60

      - name: Verify pod health in dev
        run: |
          echo "🔍 Checking pod status in mini-finance-dev..."
          kubectl get pods -n mini-finance-dev
          kubectl rollout status deployment/mini-finance-app \
            -n mini-finance-dev --timeout=120s

      - name: Show deployment summary
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ DEPLOYMENT HEALTHY"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          kubectl get deployment mini-finance-app -n mini-finance-dev -o wide
          kubectl get pods -n mini-finance-dev