name: CD Pipeline - Update Manifests & Deploy via Argo CD

on:
  workflow_run:
    workflows: ["CI Pipeline - Build, Scan & Push"]
    types: [completed]
    branches: [main, develop]

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Deploy to DEV (develop branch)
  # Argo CD watches k8s/dev → auto-syncs
  # ─────────────────────────────────────────
  update-dev-manifest:
    name: 🚀 Update Dev Manifest (Auto Deploy)
    runs-on: ubuntu-latest
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'develop'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GIT_PAT }}
          ref: develop

      - name: Update image tag in dev manifest
        run: |
          IMAGE_TAG=${{ github.event.workflow_run.head_sha }}
          echo "🔄 Updating dev manifest with image tag: $IMAGE_TAG"

          sed -i "s|glare247/mini-finance-app:.*|glare247/mini-finance-app:$IMAGE_TAG|g" \
            DevOps-Project-1/k8s/dev/manifests.yaml

          echo "✅ Updated manifest:"
          grep "image:" DevOps-Project-1/k8s/dev/manifests.yaml

      - name: Commit and push updated manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add DevOps-Project-1/k8s/dev/manifests.yaml
          git diff --staged --quiet || git commit -m "ci: update dev image tag to ${{ github.event.workflow_run.head_sha }}"
          git push origin develop

      - name: Summary
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ Dev manifest updated!"
          echo "🔄 Argo CD will auto-sync to mini-finance-dev"
          echo "📦 Image: glare247/mini-finance-app:${{ github.event.workflow_run.head_sha }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

  # ─────────────────────────────────────────
  # JOB 2: Deploy to PRODUCTION (main branch)
  # ⏸️ Pauses for manual approval first
  # ─────────────────────────────────────────
  update-production-manifest:
    name: 🏭 Update Production Manifest
    runs-on: ubuntu-latest
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    environment: production                    # ⏸️ PAUSES for manual approval

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GIT_PAT }}
          ref: main

      - name: Update image tag in production manifest
        run: |
          IMAGE_TAG=${{ github.event.workflow_run.head_sha }}
          echo "🔄 Updating production manifest with image tag: $IMAGE_TAG"

          sed -i "s|glare247/mini-finance-app:.*|glare247/mini-finance-app:$IMAGE_TAG|g" \
            DevOps-Project-1/k8s/production/manifests.yaml

          echo "✅ Updated manifest:"
          grep "image:" DevOps-Project-1/k8s/production/manifests.yaml

      - name: Commit and push updated manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add DevOps-Project-1/k8s/production/manifests.yaml
          git diff --staged --quiet || git commit -m "ci: update production image tag to ${{ github.event.workflow_run.head_sha }}"
          git push origin main

      - name: Summary
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ Production manifest updated!"
          echo "🔄 Argo CD will auto-sync to mini-finance-prod"
          echo "📦 Image: glare247/mini-finance-app:${{ github.event.workflow_run.head_sha }}"
          echo "👤 Approved by: ${{ github.actor }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
