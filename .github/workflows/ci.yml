name: CI Pipeline - Build, Scan & Push

on:
  push:
    branches: [ main, develop, 'feature/**' ]
  pull_request:
    branches: [ main, develop ]

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  IMAGE_NAME: glare247/mini-finance-app

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Lint & Basic Checks
  # ─────────────────────────────────────────
  lint:
    name: 🔍 Lint & Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate Dockerfile
        run: |
          docker run --rm -i hadolint/hadolint < DevOps-Project-1/mini-finance-app/Dockerfile || true

      - name: Validate K8s manifests
        run: |
          curl -LO https://storage.googleapis.com/kubernetes-release/release/$(curl -s https://storage.googleapis.com/kubernetes-release/release/stable.txt)/bin/linux/amd64/kubectl
          chmod +x kubectl
          ./kubectl apply --dry-run=client -f DevOps-Project-1/k8s/dev/manifests.yaml || true
          ./kubectl apply --dry-run=client -f DevOps-Project-1/k8s/production/manifests.yaml || true

  # ─────────────────────────────────────────
  # JOB 2: Build Docker Image
  # ─────────────────────────────────────────
  build:
    name: 🏗️ Build Docker Image
    runs-on: ubuntu-latest
    needs: lint
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: |
          IMAGE_TAG=${{ github.sha }}
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "Image tag: $IMAGE_TAG"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./DevOps-Project-1/mini-finance-app
          push: false                          # Don't push yet — scan first
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true                           # Load into local Docker daemon for scanning

  # ─────────────────────────────────────────
  # JOB 3: Security Scan with Trivy
  # ─────────────────────────────────────────
  security-scan:
    name: 🔐 Security Scan (Trivy)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image locally for scanning
        uses: docker/build-push-action@v5
        with:
          context: ./DevOps-Project-1/mini-finance-app
          push: false
          load: true
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.IMAGE_NAME }}:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'                       # ❌ Fails pipeline on CRITICAL/HIGH vulns

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()                           # Upload even if scan fails
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Trivy scan summary (table view)
        uses: aquasecurity/trivy-action@master
        if: always()
        with:
          image-ref: '${{ env.IMAGE_NAME }}:${{ github.sha }}'
          format: 'table'
          severity: 'CRITICAL,HIGH,MEDIUM'
          exit-code: '0'                       # Just for display, don't fail again

  # ─────────────────────────────────────────
  # JOB 4: Push to Docker Hub
  # ─────────────────────────────────────────
  push:
    name: 📦 Push to Docker Hub
    runs-on: ubuntu-latest
    needs: security-scan                       # Only push if scan passes

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push to Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: ./DevOps-Project-1/mini-finance-app
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest summary
        run: |
          echo "✅ Image pushed successfully!"
          echo "📦 Image: ${{ env.IMAGE_NAME }}:${{ github.sha }}"
          echo "🔗 Docker Hub: https://hub.docker.com/r/glare247/mini-finance-app"